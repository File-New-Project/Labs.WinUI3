name: Sync Upstream

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.SYNC_PAT }}@github.com/${{ github.repository }}.git

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/microsoft/microsoft-ui-xaml || true
          git fetch upstream winui3/main

      - name: Check for changes
        id: check
        run: |
          git diff --quiet main upstream/winui3/main || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Create sync branch
        if: steps.check.outputs.has_changes == 'true'
        run: |
          BRANCH_NAME="sync-upstream-$(date +%Y%m%d-%H%M%S)"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_ENV
          git checkout -b $BRANCH_NAME
          git merge upstream/winui3/main --no-edit || echo "merge_conflict=true" >> $GITHUB_ENV

      - name: Push sync branch
        if: steps.check.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          git push origin ${{ env.branch_name }}

      - name: Create pull request
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT  }}
        run: |
          gh pr create \
            --base main \
            --head ${{ env.branch_name }} \
            --title "Sync upstream winui3/main - $(date +%Y-%m-%d)" \
            --body ""
