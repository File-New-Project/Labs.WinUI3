name: Sync Upstream

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.SYNC_PAT }}@github.com/${{ github.repository }}.git

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/microsoft/microsoft-ui-xaml.git || true
          git fetch upstream winui3/main
          git fetch origin main  # Ensure we have latest origin/main

      - name: Check for changes
        id: check
        run: |
          # Compare origin/main (remote) with upstream/winui3/main
          BEHIND_COUNT=$(git rev-list --count origin/main..upstream/winui3/main)
          echo "Commits behind: $BEHIND_COUNT"
          if [ "$BEHIND_COUNT" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "commits_behind=$BEHIND_COUNT" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "Already up to date with upstream"
          fi

      - name: Create sync branch and merge
        if: steps.check.outputs.has_changes == 'true'
        run: |
            BRANCH_NAME="sync-upstream-$(date +%Y%m%d-%H%M%S)"
            echo "branch_name=$BRANCH_NAME" >> $GITHUB_ENV
            git checkout -b $BRANCH_NAME
            
            MERGE_OUTPUT=$(git merge upstream/winui3/main --no-edit 2>&1)
            echo "$MERGE_OUTPUT"
            
            if echo "$MERGE_OUTPUT" | grep -q "Already up to date"; then
            echo "No changes to merge"
            echo "skip_pr=true" >> $GITHUB_ENV
            elif git diff --quiet main; then
            echo "Merge resulted in no changes"
            echo "skip_pr=true" >> $GITHUB_ENV
            else
            echo "merge_status=success" >> $GITHUB_ENV
            fi

      - name: Push sync branch
        if: steps.check.outputs.has_changes == 'true' && env.skip_pr != 'true'
        run: |
            git push origin ${{ env.branch_name }}

      - name: Create Pull Request
        if: steps.check.outputs.has_changes == 'true' && env.skip_pr != 'true'
        # ... rest
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          gh pr create \
            --base main \
            --head ${{ env.branch_name }} \
            --title "Sync upstream winui3/main - $(date +%Y-%m-%d)" \
            --body ""
